<link rel="stylesheet" href="/static/world/albedo/modules/a5.css?v=19.5.1">

<div class="a5-aspectus">
    
    <div class="schema-header">
        <div class="module-title">ASPECTUS</div>
        
        <div class="dichotomy-wrapper">
            <span id="label-unus" class="dicho-label active">Unus</span>
            <div class="toggle-switch" id="schema-mode-toggle" onclick="toggleAspectusMode()">
                <div class="toggle-knob" id="schema-mode-knob"></div>
            </div>
            <span id="label-intersectus" class="dicho-label">Intersectus</span>
        </div>

        <div id="method-switch-container" class="dichotomy-wrapper" style="margin-top: 15px;">
            <span id="label-composite" class="dicho-label active">Composite</span>
            <div class="toggle-switch method-toggle" id="method-toggle" onclick="toggleMethodMode()">
                <div class="toggle-knob" id="method-knob"></div>
            </div>
            <span id="label-davison" class="dicho-label">Davison</span>
        </div>

        <div class="system-selectors" id="system-selectors" style="display: none; align-items: center; gap: 15px;">
            <div class="sel-group">
                <label>System A</label>
                <select id="sys-a-select" onchange="handleSystemAChange(this.value)">
                    <option value="default" selected>Select System</option>
                    <option value="composite">Composite (Midpoint)</option>
                    <option value="d_tropical">Davison Tropical</option>
                    <option value="d_sidereal">Davison Sidereal</option>
                    <option value="d_draconic">Davison Draconic</option>
                    <option value="d_ketunic">Davison Ketunic</option>
                    <optgroup label="Parent A (Seed 1)">
                        <option value="a_tropical">A Tropical</option>
                        <option value="a_sidereal">A Sidereal</option>
                        <option value="a_draconic">A Draconic</option>
                        <option value="a_ketunic">A Ketunic</option>
                    </optgroup>
                    <optgroup label="Parent B (Seed 2)">
                        <option value="b_tropical">B Tropical</option>
                        <option value="b_sidereal">B Sidereal</option>
                        <option value="b_draconic">B Draconic</option>
                        <option value="b_ketunic">B Ketunic</option>
                    </optgroup>
                </select>
            </div>
            <div class="sel-icon" style="color: #444; margin-top: 18px; font-size: 0.8rem;">✕</div>
            <div class="sel-group">
                <label>System B</label>
                <select id="sys-b-select" onchange="handleSystemBChange(this.value)">
                    <option value="default" selected>Waiting for System A...</option>
                </select>
            </div>
            <div style="margin-left: 10px; margin-top: 15px;">
                <button id="schema-enter-btn" class="enter-btn" onclick="fetchAspectusData()">ENTER</button>
            </div>
        </div>
    </div>

    <hr class="separator">

    <div class="section-title"> PATTERNS</div>
    
    <div class="patterns-container" id="patterns-scroll-box">
        <table class="a5-table" id="patterns-table" style="border-collapse: collapse; border-spacing: 0; width: 100%;">
            <thead>
                <tr>
                    <th style="width: 150px;">Shape</th> 
                    <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th>
                </tr>
            </thead>
            <tbody id="patterns-body">
                <tr>
                    <td colspan="7" class="placeholder-box" style="text-align: center; padding: 40px 0;">
                        Select Systems and press [ENTER]
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="spacer-50"></div>

    <div class="section-title"> ASPECTS</div>
    
    <div id="aspect-system-filter-container" style="display: none; margin-bottom: 30px;">
        <div class="dichotomy-wrapper">
            <span id="label-filter-a" class="dicho-label active">System A</span>
            <div class="toggle-switch" id="aspect-filter-toggle" onclick="toggleAspectSystemFilter()">
                <div class="toggle-knob" id="aspect-filter-knob"></div>
            </div>
            <span id="label-filter-b" class="dicho-label">System B</span>
        </div>
    </div>
    
    <div class="aspect-tabs" id="aspect-category-tabs">
        <button class="tab-btn active" data-cat="planets">Planets</button>
        <button class="tab-btn" data-cat="asteroids">Major Asteroids</button>
        <button class="tab-btn" data-cat="lilith">Lilith & Nodes</button>
        <button class="tab-btn" data-cat="fates">Fates</button>
        <button class="tab-btn" data-cat="hermetic">Hermetic</button>
    </div>

    <div class="aspect-explorer">
        <div class="col-box" id="col-bodies">
            <div class="col-header">Celestial Bodies</div>
            <div class="col-content" id="list-bodies"></div>
        </div>
        <div class="col-box" id="col-aspects">
            <div class="col-header">Aspects</div>
            <div class="col-content" id="list-aspects"></div>
        </div>
        <div class="col-box" id="col-objects">
            <div class="col-header">Objects</div>
            <div class="col-content" id="list-objects">
                <div class="placeholder-text">Select a body and aspect</div>
            </div>
        </div>
    </div>
</div>

<div id="pattern-tooltip" class="a5-tooltip"></div>
<script src="/static/world/albedo/modules/a5.js?v=19.5.1"></script>
