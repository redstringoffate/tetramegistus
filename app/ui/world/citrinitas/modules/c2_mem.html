<link rel="stylesheet" href="/static/world/citrinitas/modules/c2_mem.css?v=1005">

<div class="aleph-container" id="mem-app">
    <div class="ritual-header">
        <h3 class="ritual-title">[ מ ] DASHA CHANDRA RECTIFICATION</h3>
    </div>

    <div id="step-1-input" class="c1-module-container">
        <div class="c1-form-group">
            <label class="c1-coord-label">Date</label>
            <div class="c1-date-row">
                <select id="mem-date-y" class="c1-select"></select>
                <select id="mem-date-m" class="c1-select"></select>
                <select id="mem-date-d" class="c1-select"></select>
            </div>
        </div>

        <div class="c1-form-group">
            <label class="c1-coord-label">Location</label>
            <div class="c1-city-search-container">
                <input type="text" id="mem-city-search" class="c1-input full-width" placeholder="Search City..." autocomplete="off">
                <div id="mem-city-results" class="c1-city-results"></div>
            </div>
            
            <div id="mem-manual-toggle" class="c1-manual-toggle">or Manual Entry ▾</div>

            <div id="mem-manual-panel" class="c1-manual-panel" style="display: none;">
                <div class="c1-coord-block">
                    <div class="c1-sub-label">Latitude</div>
                    <div class="c1-coord-row">
                        <div class="c1-sign-group">
                            <div class="c1-sign-btn active" data-target="lat" data-sign="+">+</div>
                            <div class="c1-sign-btn" data-target="lat" data-sign="-">−</div>
                        </div>
                        <input id="mem-lat-int" class="c1-input-int" placeholder="00">
                        <span class="c1-dot">.</span>
                        <input id="mem-lat-dec" class="c1-input-dec" placeholder="0000">
                    </div>
                </div>
                
                <div class="c1-coord-block">
                    <div class="c1-sub-label">Longitude</div>
                    <div class="c1-coord-row">
                        <div class="c1-sign-group">
                            <div class="c1-sign-btn active" data-target="lng" data-sign="+">+</div>
                            <div class="c1-sign-btn" data-target="lng" data-sign="-">−</div>
                        </div>
                        <input id="mem-lng-int" class="c1-input-int" placeholder="000">
                        <span class="c1-dot">.</span>
                        <input id="mem-lng-dec" class="c1-input-dec" placeholder="0000">
                    </div>
                </div>

                <div class="c1-coord-block" style="margin-top: 15px;">
                    <div class="c1-sub-label">Timezone</div>
                    <select id="mem-tz" class="c1-select full-width"></select>
                </div>
            </div>
        </div>

        <div class="c1-form-group age-group">
            <label class="c1-coord-label">Current Age</label>
            <select id="mem-age" class="c1-select full-width"></select>
        </div>
        
        <button class="cyber-btn full-width btn-manifest" onclick="Mem.manifestTimeline()">MANIFEST</button>
    </div>

    <div id="step-3-questions" class="step-hidden">
        <div id="q-render-area"></div>
    </div>

    <div id="step-4-results" class="step-hidden">
        <div class="result-content">
            <div id="res-mem-content"></div>
        </div>
        <button class="cyber-btn full-width btn-restart" onclick="location.reload()">RESTART RITUAL</button>
    </div>
</div>
