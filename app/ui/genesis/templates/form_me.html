{% extends "genesis/templates/base.html" %}

{% block content %}
<div class="void">

  <style>
    /* ─────────────────────────
       Form-only styles
    ───────────────────────── */

    .date-row {
      display: flex;
      gap: 0.4rem;
    }

    .date-row select {
      flex: 1;
      width: auto;
      text-align: center;
    }

    /* City search */

    #city-results {
      margin-top: 0.4rem;
      border: 1px solid #1f5f3a;
      background: #050505;
    }

    .city-item {
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .city-item:hover {
      background: #0b1a12;
      color: #b6ffd0;
    }

    /* 🔑 Arrow key active state */
    .city-item.active {
      background: #0b1a12;
      color: #b6ffd0;
    }

    /* Manual entry */

    #manual-panel {
      display: none;
      margin-top: 0.6rem;
    }

    .coord-block {
      margin-bottom: 0.8rem;
    }

    .coord-label {
      font-size: 0.75rem;
      color: #6be68c;
      margin-bottom: 0.25rem;
    }

    .coord-row {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }

    /* 🔑 Timezone Select 수복 (약 12cm 규격 및 스타일) */
    #tz-select {
      width: 380px; 
      text-align: left;
      padding-left: 8px;
      font-family: inherit;
    }

    .sign-group {
      display: flex;
    }

    .sign-btn {
      width: 2.2rem;
      text-align: center;
      border: 1px solid #1f5f3a;
      cursor: pointer;
      user-select: none;
    }

    .sign-btn.active {
      border-color: #7CFF9B;
      color: #b6ffd0;
    }

    .coord-row input {
      text-align: center;
    }

    .coord-int { width: 4rem; }
    .coord-dot { opacity: 0.6; }
    .coord-dec { width: 5rem; }

    /* Tooltip */

    .stage-tooltip {
      position: fixed;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      white-space: nowrap;
      pointer-events: none;
      z-index: 99999;
      opacity: 0;
      transition: opacity 0.15s ease;
      color: rgb(73, 220, 225);
      background: none;
      border: none;
      padding: 0;
    }

    /* Manifest message */

    #manifested {
      display: none;
      margin-top: 3rem;
      text-align: center;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: #b6ffd0;
    }
  </style>

  <h2>Threshold of Arrival</h2>
  <div class="date-row">
    <select id="year"></select>
    <select id="month"></select>
    <select id="day"></select>
  </div>

  <h2>Hour of Incarnation</h2>
  <div class="date-row">
    <select id="hour"></select>
    <select id="minute"></select>
    <select id="second"></select>
  </div>

  <h2>Point of Emergence</h2>

  <input
    id="city-search"
    placeholder="Search city"
    tabindex="0"
  >

  <div id="city-results"></div>

  <div class="spacer-sm"></div>
  <button type="button" id="manual-toggle">Manual Entry ▾</button>

  <div id="manual-panel">

    <div class="coord-block">
      <div class="coord-label">Latitude</div>
      <div class="coord-row">
        <div class="sign-group">
          <div class="sign-btn active" data-target="lat" data-sign="+">+</div>
          <div class="sign-btn" data-target="lat" data-sign="-">−</div>
        </div>
        <input id="lat-int" class="coord-int" placeholder="00">
        <span class="coord-dot">.</span>
        <input id="lat-dec" class="coord-dec" placeholder="0000">
      </div>
    </div>

    <div class="coord-block">
      <div class="coord-label">Longitude</div>
      <div class="coord-row">
        <div class="sign-group">
          <div class="sign-btn active" data-target="lon" data-sign="+">+</div>
          <div class="sign-btn" data-target="lon" data-sign="-">−</div>
        </div>
        <input id="lon-int" class="coord-int" placeholder="000">
        <span class="coord-dot">.</span>
        <input id="lon-dec" class="coord-dec" placeholder="0000">
      </div>
    </div>

    <div class="coord-block">
      <div class="coord-label">Timezone</div>
      <select id="tz-select"></select>
    </div>

  </div>

  <div class="spacer-lg"></div>

  <button type="button" id="incarnate">Incarnate</button>

  <div id="manifested">
    The Body has Manifested
  </div>

  <div id="sign-tooltip" class="stage-tooltip"></div>

  <script src="/static/genesis/form_me.js?v=15"></script>

</div>
{% endblock %}
