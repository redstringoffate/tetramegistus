{% extends "genesis/templates/base.html" %}

{% block body_class %}centered{% endblock %}

{% block content %}
<div class="void">
  <h1>Prima Materia</h1>

  <button id="form-me">Form New Vessel [me]</button>

  <!-- hidden input (recovery trigger only, no UI, no hint) -->
  <input
        id="entry-code"
        type="password"
        autocomplete="off"
        spellcheck="false"
        style="
          position: absolute;
          opacity: 0;
          pointer-events: none;
          height: 0;
          width: 0;
        "
        aria-hidden="true"
      />

      <script src="/static/genesis/index.js"></script>

      <script>
      // 1. 페이지를 떠날 때(폼으로 가거나 월드로 갈 때) 기존 화면을 통째로 날려버리고 검은 화면만 남김
      window.addEventListener("pagehide", () => {
          document.body.innerHTML = "<div style='position:fixed;inset:0;background:#000;z-index:9999999;'></div>";
      });

      // 2. 뒤로가기로 돌아왔을 때
      window.addEventListener("pageshow", (event) => {
          if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
              // 화면은 이미 위에서 만든 검은색 빈 껍데기뿐임. 그 상태에서 서버로 새로고침을 던짐.
              document.body.style.display = "none";
              window.location.reload();
          }
      });
      </script>
      
</div>
{% endblock %}
