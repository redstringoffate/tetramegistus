<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prima Materia</title>

  {# 🚀 메타태그 안착 구멍 #}
  {% block head %}{% endblock %}

  {# 🚨 이전에 제가 넣었던 <link rel="icon" type="image/svg+xml" ...> 코드를 완전히 지웠습니다! #}

  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; background: #050505; color: #7CFF9B; }
    body { width: 100%; line-height: 1.55; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 14px; }
    body.centered { font-family: "Times New Roman", serif; color: #e6e6e6; display: flex; align-items: center; justify-content: center; }
    .void { width: 100%; box-sizing: border-box; }
    body.centered .void { max-width: 640px; min-height: 100vh; padding: 4rem 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    body:not(.centered) .void { max-width: 520px; margin: 0 auto; padding: 3.5rem 1rem 7rem; text-align: left; }
    h1 { font-weight: normal; font-size: 2.2rem; letter-spacing: 0.08em; margin: 0 0 2rem 0; }
    h2 { font-weight: normal; font-size: 0.9rem; letter-spacing: 0.06em; margin: 3rem 0 0.6rem 0; color: #6be68c; }
    p { margin: 0.25rem 0; }
    input, select { background: #070707; border: 1px solid #1f5f3a; color: #7CFF9B; padding: 0.45rem 0.6rem; font-family: inherit; font-size: 0.85rem; width: 100%; box-sizing: border-box; }
    input::placeholder { color: #3fa86a; }
    input:focus { outline: none; border-color: #7CFF9B; }
    button { background: none; border: 1px solid #1f5f3a; color: #7CFF9B; padding: 0.45rem 1.2rem; font-size: 0.85rem; letter-spacing: 0.02em; cursor: pointer; transition: border-color 0.15s ease, color 0.15s ease; }
    button:hover { border-color: #7CFF9B; color: #b6ffd0; }
    body:not(.centered) button { align-self: flex-start; }
    .spacer-sm { height: 1.25rem; }
    .spacer-md { height: 2.5rem; }
    .spacer-lg { height: 4rem; }
  </style>
</head>

<body class="{% block body_class %}{% endblock %}">
  {% block content %}{% endblock %}

  {# 🚀 쓸모없이 충돌만 일으키던 HTML 하드코딩 <div id="overlay"> 블록을 완전히 삭제했습니다! #}

  <script src="/gate/ritual.js"></script>

  <script>
    async function handleLogout() {
        try {
            const response = await fetch('/gate/logout', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            if (response.ok) {
                window.location.replace("/world/nigredo"); 
            }
        } catch (error) {
            console.error("Logout ritual failed:", error);
            window.location.reload();
        }
    }
    window.handleLogout = handleLogout;
  </script>
</body>
</html>
