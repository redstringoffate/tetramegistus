{% extends "mobile/world/shell/base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/mobile/world/shell/mypage.css?v=2">

<div class="m-cell-container">
    <h1 class="m-cell-title" id="me-ritual-trigger" data-userid="{{ request.cookies.get('session_user_id') }}">
        <span class="m-me-text">[me]</span>
        <div class="m-userid-display" id="mobile-userid-hint"></div>
    </h1>

    <div class="m-cell-section">
        <a href="/world/anamnesis" class="m-section-title">Anamnesis Core</a>
    </div>

    <div class="m-cell-section">
        <a href="/world/grimoire" class="m-section-title">The Grimoire</a>
    </div>

    <div class="m-logout-container">
        <a href="/world/logout" class="m-logout-btn">[logout]</a>
    </div>
</div> 

<div id="ritual-overlay" class="ritual-shell-overlay">
    <div class="ritual-shell-box">
        <div id="ritual-label" class="ritual-shell-title">enter 4-digit pin</div>
        <input type="password" id="ritual-input" class="ritual-shell-input" autocomplete="off" inputmode="text" spellcheck="false">
        <div id="ritual-footer" class="ritual-shell-footer">
            <span id="ritual-status" class="ritual-shell-status"></span>
        </div>
    </div>
</div>

<script src="/static/mobile/world/shell/mypage.js?v=2"></script>
{% endblock %}
