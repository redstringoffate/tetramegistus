{% extends "mobile/world/shell/base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/mobile/world/shell/anamnesis.css?v=1">

<div class="m-anamnesis-container">
    <h1 class="m-page-title">Anamnesis Core</h1>

    <div class="m-reset-section">
        <div class="m-section-label">Password Reset</div>
        
        <div class="m-input-group">
            <label>Current Password:</label>
            <input type="password" id="m-current-pw" autocomplete="off" spellcheck="false">
        </div>
        
        <div class="m-input-group">
            <label>New Password:</label>
            <input type="password" id="m-new-pw" autocomplete="off" spellcheck="false">
        </div>
        
        <div id="m-pw-error" class="m-error-msg"></div>
        
        <button class="m-reset-btn" id="m-reset-trigger">Reset</button>
    </div>

    <div class="m-code-section">
        <div class="m-code-label">16-digit master key (Disposable)</div>
        <div class="m-master-code">
            {{ user_master_key if user_master_key else "XXXX-XXXX-XXXX-XXXX" }}
        </div>
        <div class="m-code-warning">Disposable. Will renew immediately after bypass.</div>
    </div>
</div>

<script src="/static/mobile/world/shell/anamnesis.js?v=1"></script>
{% endblock %}
