<link rel="stylesheet" href="/static/mobile/world/albedo/modules/a5.css?v=1">

<div class="m-a5-container">
    <h1 class="m-materia-title">ASPECTUS</h1>

    <div class="m-anti-switch-module" style="margin-bottom: 12px;">
        <div class="m-dichotomy-module" onclick="window.toggleA5Mode()">
            <span class="m-dicho-label active" id="a5-lbl-unus">UNUS</span>
            <div class="m-toggle-switch">
                <div class="m-toggle-knob" id="a5-knob-mode"></div>
            </div>
            <span class="m-dicho-label" id="a5-lbl-intersectus">INTERSECTUS</span>
        </div>
    </div>

    <div class="m-anti-switch-module" id="a5-method-switch-container" style="margin-bottom: 15px; padding-left: 30px;">
        <div class="m-dichotomy-module" onclick="window.toggleA5Method()">
            <span class="m-dicho-label active" id="a5-lbl-comp">COMPOSITE</span>
            <div class="m-toggle-switch" style="width: 28px; height: 14px;">
                <div class="m-toggle-knob" id="a5-knob-method" style="width: 10px; height: 10px; top: 1px;"></div>
            </div>
            <span class="m-dicho-label" id="a5-lbl-davi">DAVISON</span>
        </div>
    </div>

    <div class="m-system-selectors" id="a5-system-selectors" style="display: none;">
        <div class="m-sel-row">
            <div class="m-sel-col">
                <label>System A</label>
                <select id="a5-sys-a-select" class="m-a5-select" onchange="window.handleSystemAChange(this.value)">
                    <option value="default" selected>Select System</option>
                    <option value="composite">Composite (Midpoint)</option>
                    <option value="d_tropical">Davison Tropical</option>
                    <option value="d_sidereal">Davison Sidereal</option>
                    <option value="d_draconic">Davison Draconic</option>
                    <option value="d_ketunic">Davison Ketunic</option>
                    <optgroup label="Parent A (Seed 1)">
                        <option value="a_tropical">A Tropical</option>
                        <option value="a_sidereal">A Sidereal</option>
                        <option value="a_draconic">A Draconic</option>
                        <option value="a_ketunic">A Ketunic</option>
                    </optgroup>
                    <optgroup label="Parent B (Seed 2)">
                        <option value="b_tropical">B Tropical</option>
                        <option value="b_sidereal">B Sidereal</option>
                        <option value="b_draconic">B Draconic</option>
                        <option value="b_ketunic">B Ketunic</option>
                    </optgroup>
                </select>
            </div>
            <div class="m-sel-x">✕</div>
            <div class="m-sel-col">
                <label>System B</label>
                <select id="a5-sys-b-select" class="m-a5-select" onchange="window.handleSystemBChange(this.value)">
                    <option value="default" selected>Wait for Sys A</option>
                </select>
            </div>
        </div>
        <button class="m-enter-btn" onclick="window.fetchAspectusData()">ENTER</button>
    </div>

    <div class="m-system-switch-module" style="margin-top: 20px;">
        <button class="m-sys-tab active" id="a5-tab-patterns" onclick="window.switchA5View('patterns')">PATTERNS</button>
        <button class="m-sys-tab" id="a5-tab-aspects" onclick="window.switchA5View('aspects')">ASPECTS</button>
    </div>

    <div id="m-view-patterns">
        <div class="m-cat-grid" id="a5-shapes-grid" style="grid-template-columns: repeat(3, 1fr);"></div>

        <div id="a5-pattern-detail-area" style="display: none;">
            <div class="m-card-header" style="cursor: pointer;" onclick="window.showPatternPopup()">
                <div class="m-card-title">Shape: <span id="a5-shape-name" style="color:#49dce1; margin-left:5px;"></span> <span style="font-size:0.8rem; color:#888; margin-left:5px;">ⓘ</span></div>
            </div>
            
            <div class="m-a5-table-wrapper">
                <table class="m-a5-table">
                    <thead id="m-a5-thead-patterns"></thead>
                    <tbody id="m-a5-tbody-patterns"></tbody>
                </table>
            </div>
        </div>
        <div id="a5-pattern-empty" class="m-placeholder">Select a shape to view structures.</div>
    </div>

    <div id="m-view-aspects" style="display: none;">
        
        <div id="a5-aspect-filter-container" style="display: none; margin-bottom: 20px; justify-content: center;">
            <div class="m-dichotomy-module" onclick="window.toggleAspectSystemFilter()">
                <span id="a5-lbl-filter-a" class="m-dicho-label active">SYS A</span>
                <div class="m-toggle-switch">
                    <div class="m-toggle-knob" id="a5-knob-filter"></div>
                </div>
                <span id="a5-lbl-filter-b" class="m-dicho-label">SYS B</span>
            </div>
        </div>

        <div class="m-cat-grid" id="a5-aspect-tabs" style="grid-template-columns: repeat(2, 1fr);">
            <button class="m-tab active" data-cat="planets" onclick="window.switchA5Category('planets')">Planets</button>
            <button class="m-tab" data-cat="asteroids" onclick="window.switchA5Category('asteroids')">Asteroids</button>
            <button class="m-tab" data-cat="lilith" onclick="window.switchA5Category('lilith')">Nodes</button>
            <button class="m-tab" data-cat="fates" onclick="window.switchA5Category('fates')">Fates</button>
            <button class="m-tab" data-cat="hermetic" style="grid-column: 1 / -1;">Hermetic</button>
        </div>

        <div class="m-custom-dropdown" style="margin-bottom: 15px;">
            <div class="m-dropdown-selected" id="a5-dd-selected" onclick="window.toggleA5Dropdown()">
                SELECT BODY
            </div>
            <div class="m-dropdown-list" id="a5-dd-list" style="display:none;"></div>
        </div>

        <div class="m-a5-aspects-wrapper">
            <div class="m-aspect-col m-col-narrow">
                <div class="m-aspect-header">ASPECTS</div>
                <div class="m-aspect-body" id="m-a5-list-aspects"></div>
            </div>
            <div class="m-aspect-col">
                <div class="m-aspect-header">OBJECTS</div>
                <div class="m-aspect-body" id="m-a5-list-objects"></div>
            </div>
        </div>
    </div>

    <div id="m-a5-toast" class="m-toast-hidden"></div>
    <div id="fs-popover" class="fs-popover-box"></div>
</div>

<script src="/static/mobile/world/albedo/modules/a5.js?v=1"></script>
