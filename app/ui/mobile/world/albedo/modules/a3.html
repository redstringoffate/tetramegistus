<link rel="stylesheet" href="/static/mobile/world/albedo/modules/a3.css">

<div class="m-a3-container">
    <h2 class="m-materia-title">ORDINATIO</h2>

    <div class="m-anti-switch-module" style="margin-bottom: 20px; justify-content: center; padding-left: 0; flex-direction: column; align-items: center; gap: 15px;">
        <div class="m-dichotomy-module"
             ontouchstart="showToggleTooltip('method-tooltip', 'COMPOSITE', 'DAVISON', A3_STATE.method === 'composite')"
             ontouchend="hideToggleTooltip('method-tooltip')">
            <span class="m-dicho-label active" id="label-method-comp">COMP</span>
            <div class="m-toggle-switch" onclick="switchA3Method()">
                <div class="m-toggle-knob" id="method-knob"></div>
            </div>
            <span class="m-dicho-label" id="label-method-dav">DAVI</span>
        </div>
        <div class="m-toggle-tooltip" id="method-tooltip" style="left: 50%; transform: translate(-50%, -100%);"></div>

        <div class="m-dichotomy-module" id="m-anti-composite-wrapper"
             ontouchstart="showToggleTooltip('anti-tooltip', 'NORMAL', 'ANTI-COMPOSITE', A3_STATE.mode !== 'anti')"
             ontouchend="hideToggleTooltip('anti-tooltip')">
            <span class="m-dicho-label active" id="label-mode-comp">COMP</span>
            <div class="m-toggle-switch" onclick="switchA3Mode()">
                <div class="m-toggle-knob" id="anti-knob"></div>
            </div>
            <span class="m-dicho-label" id="label-mode-anti">ANTI</span>
        </div>
        <div class="m-toggle-tooltip" id="anti-tooltip" style="left: 50%; transform: translate(-50%, -100%);"></div>
    </div>

    <div class="m-lordship-bar" id="m-a3-angles" style="display: flex; justify-content: center; margin-bottom: 20px;">
        <div class="m-lord-slot" style="text-align: center;">
            Asc:<br>
            <span class="m-val" id="val-asc" style="margin-left: 0; display: inline-block; margin-top: 4px; color: #444545;">-</span>
        </div>
        <div class="m-lord-slot" style="margin-left: 40px; text-align: center;">
            MC:<br>
            <span class="m-val" id="val-mc" style="margin-left: 0; display: inline-block; margin-top: 4px; color: #444545;">-</span>
        </div>
    </div>

    <div class="m-anti-switch-module" style="margin-bottom: 20px; justify-content: center; padding-left: 0;">
        <div class="m-dichotomy-module"
             ontouchstart="showToggleTooltip('domus-tooltip', 'CUSP MODE', 'DOMAIN MODE', A3_STATE.domus_mode !== 'domain')"
             ontouchend="hideToggleTooltip('domus-tooltip')">
            <span class="m-dicho-label active" id="label-domus-cusp">CUSP</span>
            <div class="m-toggle-switch" onclick="switchA3DomusMode()">
                <div class="m-toggle-knob" id="domus-knob"></div>
            </div>
            <span class="m-dicho-label" id="label-domus-domain">DOMAIN</span>
        </div>
        <div class="m-toggle-tooltip" id="domus-tooltip" style="left: 50%; transform: translate(-50%, -100%);"></div>
    </div>

    <div id="ordinatio-chart-wrapper" style="width: 100%; display: flex; justify-content: center; margin-bottom: 20px;"></div>

    <div class="m-connected-tabs">
        <button class="m-tab" data-sys="tropical" onclick="switchA3System('tropical')">Tropical</button>
        <button class="m-tab" data-sys="sidereal" onclick="switchA3System('sidereal')">Sidereal</button>
        <button class="m-tab" data-sys="draconic" onclick="switchA3System('draconic')">Draconic</button>
        <button class="m-tab" data-sys="ketunic" onclick="switchA3System('ketunic')">Ketunic</button>
    </div>

    <div id="m-sidereal-vault" class="m-hidden">
        <div class="m-connected-tabs m-ayan-tabs">
            <button class="m-tab" data-ayan="lahiri" onclick="switchA3Ayanamsa('lahiri')">Lahiri</button>
            <button class="m-tab" data-ayan="raman" onclick="switchA3Ayanamsa('raman')">Raman</button>
            <button class="m-tab" data-ayan="kp" onclick="switchA3Ayanamsa('kp')">KP</button>
            <button class="m-tab" data-ayan="fagan-bradley" onclick="switchA3Ayanamsa('fagan-bradley')">Fagan</button>
            <button class="m-tab" data-ayan="yukteswar" onclick="switchA3Ayanamsa('yukteswar')">Yukt</button>
        </div>
        
        <div class="m-anti-switch-module" style="display: none; margin-bottom: 20px; justify-content: center; padding-left: 0;" id="m-view-toggle">
            <div class="m-dichotomy-module"
                 ontouchstart="showToggleTooltip('view-tooltip', 'ZODIAC VIEW', 'LAGNA VIEW', A3_STATE.view !== 'lagna')"
                 ontouchend="hideToggleTooltip('view-tooltip')">
                <span class="m-dicho-label active" id="label-view-zod">ZODIAC</span>
                <div class="m-toggle-switch" onclick="switchA3View()">
                    <div class="m-toggle-knob" id="view-knob"></div>
                </div>
                <span class="m-dicho-label" id="label-view-lagna">LAGNA</span>
            </div>
            <div class="m-toggle-tooltip" id="view-tooltip" style="left: 50%; transform: translate(-50%, -100%);"></div>
        </div>
    </div>

    <div id="m-a3-cards-container" class="m-card-container"></div>

    <div id="m-a3-table-container" class="m-a10-table-wrapper" style="display: none;">
        <table class="m-a10-table">
            <colgroup id="m-a3-colgroup">
                <col style="width: 70px;">  
                <col style="width: 150px;"> 
                <col style="width: 100px;">  
                <col style="width: 150px;">  
                <col style="width: 150px;">  
                <col style="width: 150px;">  
            </colgroup>
            <thead id="m-a3-thead"></thead>
            <tbody id="m-a3-tbody"></tbody>
        </table>
    </div>

</div>

<div id="m-a3-toast" class="m-toast-hidden"></div>
<div id="fs-popover" class="fs-popover-box" style="display:none;"></div>

<script src="/static/mobile/world/albedo/modules/a3.js?v=5"></script>
