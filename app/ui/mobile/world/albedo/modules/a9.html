<link rel="stylesheet" href="/static/mobile/world/albedo/modules/a9.css?v=8">

<div class="m-a9-container">
    <h2 class="m-materia-title">SYNCHRONICUM</h2>

    <div class="m-anti-switch-module" style="margin-bottom: 20px; justify-content: center; padding-left: 0; flex-direction: column; align-items: center; gap: 15px;">
        <!-- ZODIAC vs JYOTISH -->
        <div class="m-dichotomy-module"
             ontouchstart="showToggleTooltip('a9-dicho-tooltip', 'ZODIAC', 'JYOTISH', A9_STATE.mode === 'zodiac')"
             ontouchend="hideToggleTooltip('a9-dicho-tooltip')">
            <span class="m-dicho-label active" id="a9-label-zodiac">ZODIAC</span>
            <div class="m-toggle-switch" onclick="switchA9Mode()">
                <div class="m-toggle-knob" id="a9-dicho-knob"></div>
            </div>
            <span class="m-dicho-label" id="a9-label-jyotish">JYOTISH</span>
        </div>
        <div class="m-toggle-tooltip" id="a9-dicho-tooltip" style="left: 50%; transform: translate(-50%, -100%);"></div>

        <!-- DAVISON vs SYNASTRY -->
        <div class="m-dichotomy-module" id="a9-sub-switch-wrapper"
             ontouchstart="showToggleTooltip('a9-sub-tooltip', 'DAVISON', 'SYNASTRY', A9_STATE.subMode === 'davison')"
             ontouchend="hideToggleTooltip('a9-sub-tooltip')">
            <span class="m-dicho-label active" id="a9-label-davison">DAVISON</span>
            <div class="m-toggle-switch" onclick="switchA9SubMode()">
                <div class="m-toggle-knob" id="a9-sub-knob"></div>
            </div>
            <span class="m-dicho-label" id="a9-label-synastry">SYNASTRY</span>
        </div>
        <div class="m-toggle-tooltip" id="a9-sub-tooltip" style="left: 50%; transform: translate(-50%, -100%);"></div>
    </div>

    <div class="m-connected-tabs m-ayan-tabs m-hidden" id="a9-ayanamsa-bar" style="margin-bottom: 20px;">
        </div>

    <!-- TABLE AREA -->
    <div class="m-a9-table-wrapper" id="a9-table-container">
        <table class="m-a9-table" id="a9-timeline-table">
            <thead id="a9-table-head"></thead>
            <tbody id="a9-table-body"></tbody>
        </table>
    </div>
</div>

<!-- LOADING OVERLAY -->
<div id="m-a9-loading">
    <div class="m-a9-loading-text">IN UNUM CONSTAT.</div>
</div>

<!-- TOAST -->
<div id="m-a9-toast" class="m-toast-hidden"></div>

<script src="/static/mobile/world/albedo/modules/a9.js?v=11"></script>
